<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário!</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #2D1B69;
  font-family: 'Montserrat', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  background: #3D2580;
  border-radius: 24px;
  padding: 30px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

.emoji-row {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.name {
  font-family: 'Dancing Script', cursive;
  font-size: 3rem;
  color: #fff;
  margin-bottom: 10px;
  text-shadow: 0 0 10px #C084FC;
}

.balloon-row {
  font-size: 1.8rem;
  margin-bottom: 15px;
}

.message {
  color: #DDD6FE;
  margin-bottom: 20px;
  line-height: 1.6;
}

.pb-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.foto {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #C084FC;
  box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
  transition: transform 0.3s;
}

.foto:hover {
  transform: scale(1.1);
}

.btn {
  background: #7C3AED;
  color: white;
  padding: 14px 30px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  background: #6D28D9;
  transform: scale(1.05);
}

.footer-emoji {
  margin-top: 20px;
  opacity: 0.6;
}

.confetti-container {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.confetto {
  position: absolute;
  top: -20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(540deg); }
}
</style>
</head>

<body>

<div class="confetti-container" id="confetti"></div>

<div class="card">

  <div class="emoji-row">💜💜💜</div>

  <div class="name">Paola</div>

  <div class="balloon-row">💜💩💜💩💜</div>

  <p class="message">
    Parabéns desgraça 💩<br>
    para de espirrar e valeu tmj 💜
  </p>

  <div class="pb-container">
    <img src="foto1.jpg" class="foto">
    <img src="foto2.jpg" class="foto">
  </div>

  <button class="btn" onclick="dispararConfetes()">💜💩 clica aqui nessa porra</button>

  <div class="footer-emoji">💜💩💜💩</div>

</div>

<script>
const cores = ['#A855F7','#C084FC','#ffffff'];

function criarConfeto() {
  const el = document.createElement('div');
  el.classList.add('confetto');
  el.style.left = Math.random() * 100 + 'vw';
  el.style.background = cores[Math.floor(Math.random() * cores.length)];
  el.style.width = '8px';
  el.style.height = '8px';
  el.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.getElementById('confetti').appendChild(el);
  setTimeout(() => el.remove(), 6000);
}

function dispararConfetes() {
  for (let i = 0; i < 80; i++) {
    setTimeout(criarConfeto, i * 20);
  }
}
</script>

</body>
</html>
